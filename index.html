<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Vesak AR Lantern</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="cameraVideo" autoplay playsinline muted></video>

  <div id="arContainer"></div>

  <div id="overlay">
    <div class="home-screen">
      <img src="assets/home final.jpg" alt="Vesak Day" class="home-image" />

      <button id="startBtn" class="scan-btn">
        <span class="scan-icon">✨</span>
        Scan Lantern
      </button>
    </div>
  </div>

  <div id="statusBar">Ready</div>

  <div id="controlPanel" class="hidden">
    <button id="resetAnchorBtn">Scan Again</button>
<button id="screenshotBtn">Capture</button>
  </div>

  <a id="downloadLink" class="hidden" download="vesak-ar-lantern.png">Download Screenshot</a>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script type="module" src="main.js"></script>
</body>
</html>
