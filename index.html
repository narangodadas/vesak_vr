<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Vesak AR Lantern</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="cameraVideo" autoplay playsinline muted></video>
  <div id="arContainer"></div>

  <div id="overlay">
    <div class="overlay-box">
      <h1>Vesak AR Lantern</h1>
      <p>Scan a QR code to see a colourful 3D Vesak lantern.</p>
      <p class="small">Tap the button and allow camera permission.</p>
      <button id="startBtn">Start Camera</button>
    </div>
  </div>

  <div id="statusBar">Ready</div>
  <button id="screenshotBtn" class="hidden">📸 Screenshot</button>
  <a id="downloadLink" class="hidden" download="vesak-ar-lantern.png">Download Screenshot</a>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
